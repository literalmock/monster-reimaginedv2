<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONSTER ENERGY - Ignite Your Pulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #000; overflow-x: hidden; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; }
        .hero-content { position: relative; z-index: 10; min-height: 100vh; display: flex; flex-direction: column; pointer-events: none; }
        .navbar { pointer-events: auto; animation: slideDown 1s ease-out 0.5s both; }
        .main-content { flex: 1; display: flex; align-items: center; padding-left: 8vw; pointer-events: auto; }
        .text-reveal { opacity: 0; transform: translateY(60px); animation: textReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .text-reveal-delay-1 { animation-delay: 0.8s; }
        .text-reveal-delay-2 { animation-delay: 1s; }
        .text-reveal-delay-3 { animation-delay: 1.2s; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-40px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes textReveal { from { opacity: 0; transform: translateY(60px) scale(0.95); filter: blur(20px); } to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); } }
        @keyframes glow { 0%, 100% { text-shadow: 0 0 20px rgba(57, 255, 20, 0.5), 0 0 40px rgba(57, 255, 20, 0.3), 0 0 60px rgba(57, 255, 20, 0.2); } 50% { text-shadow: 0 0 30px rgba(57, 255, 20, 0.8), 0 0 60px rgba(57, 255, 20, 0.5), 0 0 90px rgba(57, 255, 20, 0.3); } }
        .caffeine-glow { animation: glow 2s ease-in-out infinite; }
        .glass-nav { background: rgba(10, 10, 10, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .nav-link { position: relative; transition: all 0.3s ease; }
        .nav-link::after { content: ''; position: absolute; bottom: -4px; left: 50%; width: 0; height: 2px; background: linear-gradient(90deg, transparent, #39ff14, transparent); transition: all 0.3s ease; transform: translateX(-50%); }
        .nav-link:hover::after { width: 100%; }
        .nav-link:hover { color: #39ff14; text-shadow: 0 0 20px rgba(57, 255, 20, 0.5); }
        .cta-button { background: linear-gradient(135deg, rgba(57, 255, 20, 0.1) 0%, rgba(57, 255, 20, 0.05) 100%); backdrop-filter: blur(10px); border: 1px solid rgba(57, 255, 20, 0.3); transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); position: relative; overflow: hidden; }
        .cta-button::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(57, 255, 20, 0.2), transparent); transition: left 0.5s ease; }
        .cta-button:hover::before { left: 100%; }
        .cta-button:hover { background: rgba(57, 255, 20, 0.2); border-color: #39ff14; box-shadow: 0 0 40px rgba(57, 255, 20, 0.4), 0 0 80px rgba(57, 255, 20, 0.2), inset 0 0 20px rgba(57, 255, 20, 0.1); transform: translateY(-2px); }
        .scroll-indicator { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); animation: bounce 2s ease-in-out infinite; }
        @keyframes bounce { 0%, 100% { transform: translateX(-50%) translateY(0); opacity: 1; } 50% { transform: translateX(-50%) translateY(10px); opacity: 0.5; } }
        .film-grain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; opacity: 0.03; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E"); }
        .vignette { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 99; background: radial-gradient(ellipse at center, transparent 0%, transparent 40%, rgba(0,0,0,0.6) 100%); }
        ::selection { background: rgba(57, 255, 20, 0.3); color: #fff; }
        .loading-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 1000; display: flex; justify-content: center; align-items: center; transition: opacity 0.8s ease, visibility 0.8s ease; }
        .loading-screen.hidden { opacity: 0; visibility: hidden; }
        .loader-bar { width: 200px; height: 2px; background: rgba(255, 255, 255, 0.1); border-radius: 2px; overflow: hidden; }
        .loader-progress { width: 0%; height: 100%; background: linear-gradient(90deg, #39ff14, #7fff00); animation: loading 2s ease-in-out forwards; box-shadow: 0 0 20px rgba(57, 255, 20, 0.5); }
        @keyframes loading { 0% { width: 0%; } 100% { width: 100%; } }
        .monster-logo { filter: drop-shadow(0 0 20px rgba(57, 255, 20, 0.5)); }
    </style>
</head>
<body>
    <div class="loading-screen" id="loadingScreen">
        <div class="flex flex-col items-center gap-6">
            <svg class="w-20 h-20 monster-logo" viewBox="0 0 100 100" fill="none">
                <path d="M10 50 L20 30 L30 50 L40 20 L50 50 L60 25 L70 50 L80 35 L90 50" stroke="#39ff14" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <div class="loader-bar"><div class="loader-progress"></div></div>
        </div>
    </div>
    <div class="film-grain"></div>
    <div class="vignette"></div>
    <div id="canvas-container"></div>
    <div class="hero-content">
        <nav class="navbar fixed top-0 left-0 right-0 z-50 px-8 py-6">
            <div class="max-w-7xl mx-auto flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <svg class="w-10 h-10 monster-logo" viewBox="0 0 100 100" fill="none">
                        <path d="M10 50 L20 30 L30 50 L40 20 L50 50 L60 25 L70 50 L80 35 L90 50" stroke="#39ff14" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span class="text-white font-bold text-xl tracking-wider">MONSTER</span>
                </div>
                <div class="hidden md:flex items-center gap-8 glass-nav px-8 py-3 rounded-full">
                    <a href="#" class="nav-link text-white/80 text-sm font-medium uppercase tracking-wider">Products</a>
                    <a href="#" class="nav-link text-white/80 text-sm font-medium uppercase tracking-wider">Athletes</a>
                    <a href="#" class="nav-link text-white/80 text-sm font-medium uppercase tracking-wider">Events</a>
                    <a href="#" class="nav-link text-white/80 text-sm font-medium uppercase tracking-wider">Gaming</a>
                </div>
                <button class="glass-nav px-6 py-3 rounded-full text-white text-sm font-medium uppercase tracking-wider hover:bg-green-500/20 transition-all duration-300">Shop Now</button>
            </div>
        </nav>
        <div class="main-content">
            <div class="max-w-4xl">
                <h1 class="text-reveal text-white font-black text-6xl md:text-8xl lg:text-9xl leading-none tracking-tight mb-4">IGNITE YOUR<br/><span class="text-transparent bg-clip-text bg-gradient-to-r from-green-400 via-green-300 to-green-500 caffeine-glow">PULSE</span><br/>WITH</h1>
                <h2 class="text-reveal text-reveal-delay-1 text-green-400 font-black text-7xl md:text-9xl lg:text-[12rem] leading-none tracking-tighter caffeine-glow">CAFFEINE</h2>
                <p class="text-reveal text-reveal-delay-2 text-white/60 text-lg md:text-xl max-w-md mt-8 leading-relaxed">Unleash pure energy with our most potent formula yet. Engineered for those who demand maximum performance.</p>
                <div class="text-reveal text-reveal-delay-3 mt-10">
                    <button class="cta-button px-10 py-5 rounded-full text-white font-bold uppercase tracking-wider text-sm md:text-base">Experience The Power<svg class="inline-block w-5 h-5 ml-2 -mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg></button>
                </div>
            </div>
        </div>
        <div class="scroll-indicator flex flex-col items-center gap-2">
            <span class="text-white/40 text-xs uppercase tracking-widest">Scroll to explore</span>
            <svg class="w-6 h-6 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"/></svg>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
